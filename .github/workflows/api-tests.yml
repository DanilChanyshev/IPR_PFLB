name: API PetStore

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches:
      - develop

    paths:
      - 'api-ipr/**'
      - 'pom.xml'
      - '.github/workflows/api-tests.yml'
      - '.github/actions/**'

jobs:
  api-test:
    runs-on: ubuntu-latest
    name: Run API tests

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java -v 21
        uses: ./.github/actions/setup_java

      - name: Run Api test's
        run: mvn -pl api-ipr test
        continue-on-error: true

      - name: Upload api allure results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results
          path: api-ipr/target/allure-results
          retention-days: 3

  generate-allure:
    runs-on: ubuntu-latest
    needs: api-test
    name: Generate allure report
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Downlod java
        uses: ./.github/actions/setup_java

      - name: Install Allure
        uses: ./.github/actions/install_allure

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: allure-results
          path: allure-results

      - name: Checkout gh-pages
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Restore history
        run: |
          if [ -d gh-pages/history ]; then
            mkdir -p allure-results/history
            cp -R gh-pages/history/* allure-results/history/
          fi

      - name: Generate allure report
        run: allure generate -c allure-results --clean -o _site

      - name: Result generate
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: _site
          path: _site
          retention-days: 3

  publish-allure-report:
    runs-on: ubuntu-latest
    needs: generate-allure
    name: Publish allure report

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8

#      - name: Publish allure
#        uses: peaceiris/actions-gh-pages@v4
#        with:
#          github_token: ${{ secrets.GITHUB_TOKEN }}
#          publish_branch: gh-pages
#          publish_dir: ./_site

      - name: Upload page artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy GitHun Page
        id: deploy
        uses: actions/deploy-pages@v4