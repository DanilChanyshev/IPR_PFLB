name: API PetStore

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches:
      - develop

    paths:
      - 'api-ipr/**'
      - 'pom.xml'
      - '.github/workflows/api-tests.yml'
      - '.github/actions/**'

  workflow_dispatch:
    inputs:
      deployment-target:
        description: Choose
        required: true
        default: api
        type: choice
        options:
          - api

jobs:

  api-test:
    runs-on: ubuntu-latest
    name: Run API tests

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java -v 21
        uses: ./.github/actions/setup_java

      - name: Check maven version
        run: mvn --version

      - name: Run Api test's
        run: mvn -pl api-ipr test
        continue-on-error: true

      - name: Upload api allure results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results
          path: api-ipr/target/allure-results
          retention-days: 1

  generate-allure:
    runs-on: ubuntu-latest
    needs: api-test
    name: Generate allure report
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java -v 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: java --version

      - name: Install Allure
        uses: ./.github/actions/install_allure

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Restore history
        run: |
          if [ -d gh-pages/history ]; then
            echo "History restored"
            mkdir -p allure-results/history
            cp -R gh-pages/history/* allure-results/history/
          fi

      - name: Generate allure
        run: allure generate -c allure-results -o _site

      - name: Result generate
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: _site
          path: _site
          retention-days: 1

  publish-allure-report:
    runs-on: ubuntu-latest
    needs: generate-allure
    name: Publish allure report

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Upload page artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy GitHun Page
        id: deploy
        uses: actions/deploy-pages@v4