name: API PetStore

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches:
      - develop

    paths:
      - 'api-ipr/**'
      - 'pom.xml'
      - '.github/workflows/api-tests.yml'

  workflow_dispatch:

jobs:
  api-test:
    runs-on: ubuntu-latest
    name: Run API tests

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java -v 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven
      - run: java --version

      - name: Check maven version
        run: mvn --version

      - name: Run Api test's
        run: mvn -pl api-ipr test

      - name: Upload api surefire artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: surefire artifact
          path: api-ipr/target/surefire-reports
          retention-day: 1

      - name: Upload api allure results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results
          path: api-ipr/target/allure-results
          retention-day: 1

  generate-allure:
    runs-on: ubuntu-latest
    needs: api-test
    name: Generate allure report
    steps:
      - name: Set up Java -v 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven
      - run: java --version

      - run: sudo wget https://github.com/allure-framework/allure2/releases/download/2.23.1/allure-2.23.1.tgz && sudo tar -zxvf allure-2.23.1.tgz -C /opt/ && sudo ln -s /opt/allure-2.23.1/bin/allure /usr/bin/allure

      - name: Download artifacts
        uses: actions/download-artifact@v8
      - run: allure generate -c allure-results -o _site

      - name: Result generate
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: _site
          path: _site
          retention-day: 1

  publish-allure-report:
    runs-on: ubuntu-latest
    needs: generate-allure
    name: Publish allure report
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Upload page artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy GitHun Page
        id: deploy
        uses: actions/deploy-pages@v4