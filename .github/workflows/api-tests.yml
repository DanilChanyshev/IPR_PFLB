name: API PetStore

on:
  push:
    branches:
      - develop

    paths:
      - 'api-ipr/**'
      - 'pom.xml'
      - '.github/workflows/api-tests.yml'

  workflow_dispatch:

jobs:
  load workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java -v 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven
      - run: java --version

      - name: Check maven version
        run: mvn --version

  run api test's:
    needs: [load workspace]
    runs on: ubuntu-latest
    steps:
      - name: Run Api test's
        run: mvn -pl api-ipr test

  upload artifact's:
    needs: [run api test's]
    runs on: ubuntu-latest
    steps:
      - name: Upload surefire artifact's
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: surefire artifact
          path: api-ipr/target/surefire-reports

      - name: Upload allure artifact's
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results
          path: api-ipr/target/allure-results